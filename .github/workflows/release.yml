name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o daybrief-linux-amd64 ./cmd/daybrief

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: daybrief-linux-amd64
          generate_release_notes: true
